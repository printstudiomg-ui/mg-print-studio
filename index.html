<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M&G PRINT STUDIO</title>
  <meta name="description" content="M&G PRINT STUDIO - Creativitate cu zâmbetul pe buze." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070707;
      --card:#111;
      --line:#d8b06b;
      --text:#f7f2e9;
      --soft:#d9d1c4;
      --gold:#d8b06b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 34%),#050505;
      color:var(--text);
      font-family:'Montserrat',Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }
    .card{
      width:min(100%,430px);
      background:linear-gradient(145deg,#151515,#080808);
      border:1px solid rgba(216,176,107,.72);
      border-radius:28px;
      padding:25px 20px 24px;
      text-align:center;
      box-shadow:0 30px 90px rgba(0,0,0,.55);
    }
    .logo{
      width:220px;
      max-width:82%;
      height:auto;
      display:block;
      margin:0 auto 18px;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));
    }
  .slogan{
    font-family:'Great Vibes', cursive;
    font-size:42px;
    font-weight:400;
    color:#f5d8a4;
    line-height:1.25;
    margin:8px 0 18px;
    letter-spacing:1px;
    text-shadow:0 0 12px rgba(216,176,107,.18);
    }
    .heart{
      color:#f0d39a;
      font-size:30px;
      margin-bottom:14px;
    }
    .intro{
      margin:0 0 16px;
      font-size:16px;
      color:#f1eee8;
    }
    .links{
      display:grid;
      gap:11px;
    }
    .btn{
      color:var(--text);
      text-decoration:none;
      min-height:64px;
      border:1px solid rgba(216,176,107,.62);
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 16px;
      background:linear-gradient(135deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
    }
    .left{
      display:flex;
      align-items:center;
      gap:14px;
      text-align:left;
      min-width:0;
    }
    .icon{
      width:38px;
      height:38px;
      border:1px solid rgba(216,176,107,.75);
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#f0d39a;
      font-size:21px;
      font-family:'Cormorant Garamond',serif;
    }
    .txt{
      font-family:'Cormorant Garamond',serif;
      font-size:25px;
      line-height:1.05;
      color:#fffaf2;
    }
    .sub{
      display:block;
      font-family:'Montserrat',Arial,sans-serif;
      font-size:13.5px;
      color:var(--soft);
      margin-top:4px;
    }
    .arrow{
      color:#f0d39a;
      font-size:34px;
      font-family:'Cormorant Garamond',serif;
      padding-left:8px;
    }
    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:22px 12px 13px;
      color:#f0d39a;
      font-size:22px;
    }
    .divider:before,.divider:after{
      content:"";
      height:1px;
      flex:1;
      background:linear-gradient(90deg,transparent,rgba(216,176,107,.85),transparent);
    }
    .footer{
      color:#f0d39a;
      font-size:15px;
      line-height:1.6;
      letter-spacing:.03em;
      margin:0;
    }
    @media(max-width:380px){
      .card{padding:22px 15px}
      .slogan{font-size:30px}
      .txt{font-size:23px}
      .footer{font-size:13.5px}
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Logo M&G PRINT STUDIO">
    <p class="slogan">Creativitate cu zâmbetul pe buze.</p>
    <div class="heart">♡</div>
    <p class="intro">Alege unde vrei să ne găsești:</p>

    <section class="links">
      <a class="btn" href="https://www.facebook.com/mgprintstudio" target="_blank" rel="noopener">
        <span class="left"><span class="icon">f</span><span class="txt">Facebook<span class="sub">/mgprintstudio</span></span></span><span class="arrow">›</span>
      </a>
      <a class="btn" href="https://www.instagram.com/printstudiomg/" target="_blank" rel="noopener">
        <span class="left"><span class="icon">◎</span><span class="txt">Instagram<span class="sub">@printstudiomg</span></span></span><span class="arrow">›</span>
      </a>
      <a class="btn" href="https://tiktok.com/@mgprintstudio" target="_blank" rel="noopener">
        <span class="left"><span class="icon">♪</span><span class="txt">TikTok<span class="sub">@mgprintstudio</span></span></span><span class="arrow">›</span>
      </a>
      <a class="btn" href="https://g.page/r/CX3_1EP6NiJ4EAE/review" target="_blank" rel="noopener">
        <span class="left"><span class="icon">☆</span><span class="txt">Recenzii Google<span class="sub">Lasă-ne o recenzie</span></span></span><span class="arrow">›</span>
      </a>
      <a class="btn" href="https://wa.me/40752754289" target="_blank" rel="noopener">
        <span class="left"><span class="icon">☏</span><span class="txt">WhatsApp<span class="sub">0752 754 289</span></span></span><span class="arrow">›</span>
      </a
    </section>

    <div class="divider">♥</div>
    <p class="footer">Foto-video • Printare • Personalizare • Design grafic</p>
  </main>
</body>
</html>
